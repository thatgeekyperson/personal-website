name: Deploy & Optimize

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-and-optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allows Claude's fix commits to be pushed back

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Install global tools
        run: npm install -g vercel@latest @lhci/cli@0.14 @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy preview & optimize
        id: optimize
        run: node scripts/deploy-optimize.js
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

